name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore rw.sln

    - name: Build GPSBabel project (required dependency)
      run: msbuild gpsbabel\msvc\GPSBabel.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143

    - name: Build RW project
      run: msbuild rw\RW.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: rw-debug-build
        path: |
          rw/*.dll
          rw/RWR.exe
          rw/GPSBabel.exe
        if-no-files-found: warn
